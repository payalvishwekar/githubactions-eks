name: Build & Push to ECR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hello-devops
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::287466334815:role/GitHubActionsEKSRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Update Image Tag in Manifest
        run: |
          sed -i 's|IMAGE_PLACEHOLDER|${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}|g' k8s/deployment.yml
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          
          git add k8s/deployment.yml
          git commit -m "updated with latest image"
          #git push origin main
          # # git config user.name "github-actions[bot]"
          # # git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # git add k8s/deployment.yml
          # git commit -m "updated the image latest tag"
          # git push origin main
          
          # if git diff --staged --quiet; then
          #   echo "No changes to commit"
          # else
          #   git commit -m "Update image to ${{ env.IMAGE_TAG }}"
          git push https://${{ secrets.PAT_TOKEN }}@github.com/payalvishwekar/githubactions-eks.git HEAD:main
          # fi
